openapi: 3.0.3
info:
  title: Nomad API (MVP v2)
  version: 2.0.0
  description: |
    Expanded MVP API contract for Nomad with full hook coverage:
    - Auth + Onboarding restored
    - CRUD-expanded resources for courses, communities, posts, and messaging
servers:
  - url: http://localhost:3000/api
    description: Local dev
  - url: https://api.nomad.example.com
    description: Production (placeholder)
tags:
  - name: Auth
  - name: Users
  - name: Courses
  - name: Planner
  - name: Communities
  - name: Feed
  - name: Messages
  - name: Calendar
  - name: Notifications
  - name: Onboarding
  - name: Search
security:
  - bearerAuth: []
paths:
  /me:
    get:
      tags: [Users]
      summary: Get current user
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    patch:
      tags: [Users]
      summary: Update current user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserRequest" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      tags: [Users]
      summary: Delete current user account
      responses:
        "204":
          description: Account removed
  /users:
    get:
      tags: [Users]
      summary: List/search users
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: university
          schema: { type: string }
        - in: query
          name: major
          schema: { type: string }
        - in: query
          name: year
          schema: { type: string }
        - in: query
          name: connected
          schema: { type: boolean }
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedUsers" }
  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user profile
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
  /users/{userId}/connect:
    post:
      tags: [Users]
      summary: Connect with user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectionStatusResponse" }
    delete:
      tags: [Users]
      summary: Remove connection
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectionStatusResponse" }

  /courses:
    get:
      tags: [Courses]
      summary: List courses
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: department
          schema: { type: string }
        - in: query
          name: difficulty
          schema:
            type: string
            enum: [Intro, Intermediate, Advanced, Graduate]
      responses:
        "200":
          description: Courses
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedCourses" }
    post:
      tags: [Courses]
      summary: Create course
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCourseRequest" }
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Course" }
  /courses/{courseId}:
    get:
      tags: [Courses]
      summary: Get course details
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Course" }
    patch:
      tags: [Courses]
      summary: Update course
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCourseRequest" }
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Course" }
    delete:
      tags: [Courses]
      summary: Delete course
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "204":
          description: Course deleted
  /courses/{courseId}/students:
    get:
      tags: [Courses]
      summary: Get students in course
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - in: query
          name: connected
          schema: { type: boolean }
      responses:
        "200":
          description: Classmates
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedUsers" }
  /courses/{courseId}/connections:
    get:
      tags: [Courses]
      summary: Get known vs suggested classmates
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Connection buckets
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CourseConnections" }

  /planner/courses:
    get:
      tags: [Planner]
      summary: Get planner state
      responses:
        "200":
          description: Planner
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerState" }
    put:
      tags: [Planner]
      summary: Replace planner course IDs
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePlannerRequest" }
      responses:
        "200":
          description: Updated planner
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerState" }

  /communities:
    get:
      tags: [Communities]
      summary: List communities
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: joined
          schema: { type: boolean }
      responses:
        "200":
          description: Communities
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedCommunities" }
    post:
      tags: [Communities]
      summary: Create community
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommunityRequest" }
      responses:
        "201":
          description: Created community
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Community" }
  /communities/{communityId}:
    get:
      tags: [Communities]
      summary: Get community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "200":
          description: Community
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Community" }
    patch:
      tags: [Communities]
      summary: Update community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCommunityRequest" }
      responses:
        "200":
          description: Updated community
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Community" }
    delete:
      tags: [Communities]
      summary: Delete community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "204":
          description: Community deleted
  /communities/{communityId}/join:
    post:
      tags: [Communities]
      summary: Join community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JoinState" }
    delete:
      tags: [Communities]
      summary: Leave community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "200":
          description: Left
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JoinState" }

  /posts:
    get:
      tags: [Feed]
      summary: List posts
      parameters:
        - in: query
          name: tab
          schema:
            type: string
            enum: [all, following, top]
        - in: query
          name: communityId
          schema: { type: string }
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedPosts" }
    post:
      tags: [Feed]
      summary: Create post
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePostRequest" }
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /posts/{postId}:
    patch:
      tags: [Feed]
      summary: Update post
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePostRequest" }
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
    delete:
      tags: [Feed]
      summary: Delete post
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "204":
          description: Post deleted
  /posts/{postId}/reactions:
    post:
      tags: [Feed]
      summary: React to post
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostReactionRequest" }
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /posts/{postId}/replies:
    post:
      tags: [Feed]
      summary: Create reply
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReplyRequest" }
      responses:
        "201":
          description: Reply created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Reply" }

  /messages/conversations:
    get:
      tags: [Messages]
      summary: List conversations
      parameters:
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedConversations" }
    post:
      tags: [Messages]
      summary: Create conversation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConversationRequest" }
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /messages/conversations/{conversationId}:
    patch:
      tags: [Messages]
      summary: Update conversation metadata
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateConversationRequest" }
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
    delete:
      tags: [Messages]
      summary: Delete conversation
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "204":
          description: Conversation deleted
  /messages/conversations/{conversationId}/messages:
    get:
      tags: [Messages]
      summary: List messages
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedMessages" }
    post:
      tags: [Messages]
      summary: Send message
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMessageRequest" }
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
  /messages/conversations/{conversationId}/messages/{messageId}:
    delete:
      tags: [Messages]
      summary: Delete message
      parameters:
        - $ref: "#/components/parameters/ConversationId"
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Message deleted

  /calendar/events:
    get:
      tags: [Calendar]
      summary: List events
      parameters:
        - in: query
          name: start
          schema: { type: string, format: date-time }
        - in: query
          name: end
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedCalendarEvents" }
    post:
      tags: [Calendar]
      summary: Create event
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCalendarEventRequest" }
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarEvent" }
  /calendar/events/{eventId}:
    patch:
      tags: [Calendar]
      summary: Update event
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCalendarEventRequest" }
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarEvent" }
    delete:
      tags: [Calendar]
      summary: Delete event
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Event deleted

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationsResponse" }
  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all read
      responses:
        "204":
          description: Done
  /notifications/{notificationId}/read:
    post:
      tags: [Notifications]
      summary: Mark notification read
      parameters:
        - in: path
          name: notificationId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Done

  /onboarding/options:
    get:
      tags: [Onboarding]
      security: []
      summary: Get onboarding option lists
      responses:
        "200":
          description: Option catalogs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OnboardingOptionsResponse" }
  /onboarding/complete:
    post:
      tags: [Onboarding]
      summary: Complete onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OnboardingCompleteRequest" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /search:
    get:
      tags: [Search]
      summary: Global search
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResponse" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      in: path
      name: userId
      required: true
      schema: { type: string }
    CourseId:
      in: path
      name: courseId
      required: true
      schema: { type: string }
    CommunityId:
      in: path
      name: communityId
      required: true
      schema: { type: string }
    PostId:
      in: path
      name: postId
      required: true
      schema: { type: string }
    ConversationId:
      in: path
      name: conversationId
      required: true
      schema: { type: string }
  schemas:
    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    AuthResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: "#/components/schemas/User" }
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        avatar: { type: string }
        university: { type: string }
        major: { type: string }
        minor: { type: string, nullable: true }
        year: { type: string }
        bio: { type: string }
        headline: { type: string, nullable: true }
        interests:
          type: array
          items: { type: string }
        courses:
          type: array
          items: { type: string }
        communities:
          type: array
          items: { type: string }
        isConnected: { type: boolean }
        isOnline: { type: boolean }
    UpdateUserRequest:
      type: object
      properties:
        name: { type: string }
        bio: { type: string }
        headline: { type: string }
        major: { type: string }
        minor: { type: string }
        year: { type: string }
        interests:
          type: array
          items: { type: string }
    Course:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        title: { type: string }
        credits: { type: integer }
        description: { type: string }
        prerequisites:
          type: array
          items: { type: string }
        nextCourses:
          type: array
          items: { type: string }
        department: { type: string }
        difficulty:
          type: string
          enum: [Intro, Intermediate, Advanced, Graduate]
        tags:
          type: array
          items: { type: string }
        students:
          type: array
          items: { type: string }
        rating: { type: number, format: float }
    CreateCourseRequest:
      type: object
      properties:
        code: { type: string }
        title: { type: string }
        credits: { type: integer }
        description: { type: string }
        prerequisites:
          type: array
          items: { type: string }
        nextCourses:
          type: array
          items: { type: string }
        department: { type: string }
        difficulty:
          type: string
          enum: [Intro, Intermediate, Advanced, Graduate]
        tags:
          type: array
          items: { type: string }
    UpdateCourseRequest:
      allOf:
        - $ref: "#/components/schemas/CreateCourseRequest"
    PlannerState:
      type: object
      properties:
        courseIds:
          type: array
          items: { type: string }
    UpdatePlannerRequest:
      type: object
      required: [courseIds]
      properties:
        courseIds:
          type: array
          items: { type: string }
    Community:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        banner: { type: string, nullable: true }
        color: { type: string }
        members: { type: integer }
        posts: { type: integer }
        tags:
          type: array
          items: { type: string }
        isJoined: { type: boolean }
        university: { type: string, nullable: true }
    CreateCommunityRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        banner: { type: string }
        color: { type: string }
        tags:
          type: array
          items: { type: string }
        university: { type: string }
    UpdateCommunityRequest:
      allOf:
        - $ref: "#/components/schemas/CreateCommunityRequest"
    JoinState:
      type: object
      properties:
        isJoined: { type: boolean }
    Post:
      type: object
      properties:
        id: { type: string }
        authorId: { type: string }
        communityId: { type: string }
        title: { type: string }
        content: { type: string }
        timestamp: { type: string, format: date-time }
        likes: { type: integer }
        isLiked: { type: boolean }
        tags:
          type: array
          items: { type: string }
        replies:
          type: array
          items: { $ref: "#/components/schemas/Reply" }
    Reply:
      type: object
      properties:
        id: { type: string }
        authorId: { type: string }
        content: { type: string }
        timestamp: { type: string, format: date-time }
        likes: { type: integer }
        isLiked: { type: boolean }
    CreatePostRequest:
      type: object
      required: [communityId, title, content]
      properties:
        communityId: { type: string }
        title: { type: string }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
    UpdatePostRequest:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
    PostReactionRequest:
      type: object
      required: [reaction]
      properties:
        reaction:
          type: string
          enum: [like, celebrate, insightful, curious, support]
    CreateReplyRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
    Conversation:
      type: object
      properties:
        id: { type: string }
        participants:
          type: array
          items: { type: string }
        isGroup: { type: boolean }
        groupName: { type: string, nullable: true }
        lastMessage: { type: string }
        lastTimestamp: { type: string, format: date-time }
        unread: { type: integer }
    CreateConversationRequest:
      type: object
      required: [participants]
      properties:
        participants:
          type: array
          items: { type: string }
        isGroup: { type: boolean }
        groupName: { type: string }
    UpdateConversationRequest:
      type: object
      properties:
        groupName: { type: string }
    Message:
      type: object
      properties:
        id: { type: string }
        senderId: { type: string }
        content: { type: string }
        timestamp: { type: string, format: date-time }
    CreateMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
    CalendarEvent:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        date: { type: string, format: date }
        startTime: { type: string }
        endTime: { type: string }
        location: { type: string, nullable: true }
        type:
          type: string
          enum: [class, study, social, deadline, custom]
        color: { type: string }
    CreateCalendarEventRequest:
      type: object
      properties:
        title: { type: string }
        date: { type: string, format: date }
        startTime: { type: string }
        endTime: { type: string }
        location: { type: string }
        type:
          type: string
          enum: [class, study, social, deadline, custom]
        color: { type: string }
    UpdateCalendarEventRequest:
      allOf:
        - $ref: "#/components/schemas/CreateCalendarEventRequest"
    Notification:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        fromId: { type: string }
        content: { type: string }
        timestamp: { type: string, format: date-time }
        read: { type: boolean }
    OnboardingOptionsResponse:
      type: object
      properties:
        universities:
          type: array
          items: { type: string }
        majors:
          type: array
          items: { type: string }
        interests:
          type: array
          items: { type: string }
    OnboardingCompleteRequest:
      type: object
      required: [university, fullName, majors]
      properties:
        university: { type: string }
        fullName: { type: string }
        majors:
          type: array
          items: { type: string }
        minors:
          type: array
          items: { type: string }
        interests:
